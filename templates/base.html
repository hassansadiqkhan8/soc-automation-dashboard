{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SOC Dashboard{% endblock %}</title>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">SOC Dashboard</span>
            </div>
        </div>
        
        <ul class="nav-links">
            <li>
                <a href="{% url 'dashboard:home' %}" 
                   class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="{% url 'dashboard:alert_list' %}"
                   class="{% if request.resolver_match.url_name == 'alert_list' %}active{% endif %}">
                    <span class="nav-icon">🚨</span>
                    <span>Alerts</span>
                </a>
            </li>
            <li>
                <a href="{% url 'dashboard:log_viewer' %}"
                   class="{% if request.resolver_match.url_name == 'log_viewer' %}active{% endif %}">
                    <span class="nav-icon">📋</span>
                    <span>Log Viewer</span>
                </a>
            </li>
            <li>
                <a href="{% url 'dashboard:analytics' %}"
                   class="{% if request.resolver_match.url_name == 'analytics' %}active{% endif %}">
                    <span class="nav-icon">📈</span>
                    <span>Analytics</span>
                </a>
            </li>
            <li>
                <a href="{% url 'admin:index' %}">
                    <span class="nav-icon">⚙️</span>
                    <span>Admin</span>
                </a>
            </li>
        </ul>
        
        <div class="sidebar-footer">
            <div class="engine-status">
                <span class="status-dot"></span>
                <span>Engine Active</span>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            <div class="top-bar-right">
                <span class="current-time" id="currentTime"></span>
            </div>
        </header>
        
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <script>
        // Update current time
        function updateTime() {
            const now = new Date();
            const options = { 
                weekday: 'short', year: 'numeric', month: 'short', 
                day: 'numeric', hour: '2-digit', minute: '2-digit', 
                second: '2-digit' 
            };
            document.getElementById('currentTime').textContent = now.toLocaleDateString('en-US', options);
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
